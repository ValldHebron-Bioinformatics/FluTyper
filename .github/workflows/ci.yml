name: FluTyper CI

on:
  pull_request:
    branches: [main, mutations]
  push:
    branches: [main]

jobs:
  nf-test:
    name: Nextflow Module Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "latest"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mafft
          
          # Install seqkit
          curl -fsSL "https://github.com/shenwei356/seqkit/releases/download/v2.8.2/seqkit_linux_amd64.tar.gz" \
            | tar xz && sudo mv seqkit /usr/local/bin/

          # Install nextclade
          curl -fsSL "https://github.com/nextstrain/nextclade/releases/download/3.9.1/nextclade-x86_64-unknown-linux-musl" \
            -o nextclade && chmod +x nextclade && sudo mv nextclade /usr/local/bin/

      - name: Install Python Stack
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl biopython numpy

      - name: Install nf-test
        run: |
          curl -fsSL https://get.nf-test.com | bash
          sudo mv nf-test /usr/local/bin/

      - name: Run Module Tests
        # We point to the specific config for nf-test if it exists
        # Ensure tests/data/resources/ is committed to the repo!
        run: nf-test test tests/modules/*.nf.test --verbose

  integration-test:
    name: Full Pipeline Integration
    needs: [nf-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: nf-core/setup-nextflow@v2

      - name: Run Pipeline (CI Profile)
        run: |
          # We use the 'ci' profile defined in your config to limit resources
          nextflow run main.nf \
            --inputFasta "tests/data/test.fasta" \
            --protocol AVIAN \
            --outDir ci_output \
            -profile ci

      - name: Validate Final Artifacts
        run: |
          # Verify that the final outputs actually contain data
          test -s ci_output/final_genotyping_results.csv
          test -s ci_output/final_mutations_report.xlsx