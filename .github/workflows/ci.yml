name: FluTyper CI

on:
  [pull_request, release]
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Unit Testing for individual modules
  nf-test:
    name: Nextflow Module Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Java
        uses: actions/setup-java@v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v3.0.0
        with:
          version: "latest"

      - name: Cache Python Packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mafft
          
          # Unified tool installation
          curl -fsSL "https://github.com/shenwei356/seqkit/releases/download/v2.10.1/seqkit_linux_amd64.tar.gz" | tar xz
          sudo mv seqkit /usr/local/bin/

          curl -fsSL "https://github.com/nextstrain/nextclade/releases/download/3.18.0/nextclade-x86_64-unknown-linux-musl" -o nextclade
          chmod +x nextclade && sudo mv nextclade /usr/local/bin/

          python3 -m pip install --upgrade pip
          pip install pandas openpyxl biopython numpy plotly nbformat genin2 folium

      - name: Setup nf-test
        uses: nf-core/setup-nf-test@v2.1.0
        with:
          version: '0.9.5'
          install-pdiff: true

      - name: Run Module Tests
        run: nf-test test tests/modules/*.nf.test --verbose

  # Job 2: Full pipeline testing (only runs if unit tests pass)
  integration-test:
    name: Full Pipeline Integration
    needs: [nf-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Java
        uses: actions/setup-java@v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v3.0.0
        with:
          version: "latest"

      - name: Install System Tools & Dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends mafft
          
          curl -fsSL "https://github.com/shenwei356/seqkit/releases/download/v2.10.1/seqkit_linux_amd64.tar.gz" | tar xz
          sudo mv seqkit /usr/local/bin/
          
          curl -fsSL "https://github.com/nextstrain/nextclade/releases/download/3.18.0/nextclade-x86_64-unknown-linux-musl" -o nextclade
          chmod +x nextclade && sudo mv nextclade /usr/local/bin/
          
          python3 -m pip install --upgrade pip
          pip install pandas openpyxl biopython numpy plotly nbformat genin2

      - name: Setup nf-test
        uses: nf-core/setup-nf-test@v2.1.0
        with:
          version: '0.9.5'
          install-pdiff: true

      - name: Run Pipeline (nf-test)
        run: nf-test test tests/main.nf.test --verbose
